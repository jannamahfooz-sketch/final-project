<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Jana Mohamed mahfouz</title>
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a192f;
            --bg-nav: rgba(16, 33, 65, 0.8);
            --text-main: #e6f1ff;
            --text-dim: #8892b0;
            --accent: #64ffda;
            --border: rgba(100, 255, 218, 0.1);
            --card-bg: rgba(255, 255, 255, 0.03);
            --transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        [data-theme="light"] {
            --bg-color: #f8fafc;
            --bg-nav: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-dim: #475569;
            --accent: #0ea5e9;
            --border: rgba(0, 0, 0, 0.05);
            --card-bg: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: var(--transition);
            margin: 0;
            padding-top: 120px;
            text-align: center;
        }

        .navbar-wrapper {
            position: fixed;
            top: 20px;
            left: 0; right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
        }

        #mainNav {
            background: var(--bg-nav);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 24px;
            width: 90%;
            max-width: 800px;
        }

        .navbar-brand { font-family: 'Outfit'; color: var(--accent) !important; font-weight: 700; }
        .nav-link { font-size: 0.85rem; color: var(--text-main) !important; margin: 0 10px; font-weight: 500; }
        .nav-link.active { color: var(--accent) !important; }
        .nav-cta { background: var(--accent); color: var(--bg-color) !important; border-radius: 50px; padding: 6px 20px !important; font-size: 0.8rem; font-weight: 600; margin-left: 10px; }

        .contact-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .page-title { font-family: 'Outfit'; font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .page-subtitle { color: var(--text-dim); margin-bottom: 40px; font-size: 0.95rem; }

        .contact-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 25px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: left;
        }

        .form-label {
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            font-family: 'Outfit';
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 12px;
            padding: 12px 15px;
            transition: var(--transition);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.1);
            color: var(--text-main);
        }

        .btn-send {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 50px;
            padding: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 20px;
            transition: var(--transition);
        }

        .btn-send:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100, 255, 218, 0.2);
            background: var(--text-main);
            color: var(--bg-color);
        }

       
        footer { margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 0.85rem; }

        .theme-btn { background: none; border: none; color: var(--text-main); font-size: 1.1rem; cursor: pointer; margin-left: 10px; }

        @media (max-width: 991px) {
            .navbar-collapse { background: var(--bg-color); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-top: 15px; }
            .contact-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar navbar-expand-lg" id="mainNav">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">PORTFOLIO</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon" style="filter: contrast(0);"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto align-items-center">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                        <li class="nav-item"><a class="nav-link nav-cta active" href="contact.html">Contact Me</a></li>
                        <li class="nav-item">
                            <button class="theme-btn" id="toggleMode">🌙</button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <main class="contact-container mt-5">
        <h1 class="page-title">Get In <span style="color: var(--accent)">Touch</span></h1>
        <p class="page-subtitle">Have a question or want to work together? Drop me a message!</p>
        
        <div id="formFeedback"></div>
        
        <div class="contact-card">
            <form id="contactForm" onsubmit="return validateForm(event)">
                <div class="mb-4">
                    <label class="form-label">FULL NAME</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name">
                </div>
                <div class="mb-4">
                    <label class="form-label">EMAIL ADDRESS</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="mb-4">
                    <label class="form-label">YOUR MESSAGE</label>
                    <textarea id="message" class="form-control" rows="5" placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="btn-send w-100">Send Message</button>
            </form>
        </div>
    </main>

    <footer>
        <p class="mb-0">&copy; 2026 Jana Mohamed Mahfouz. Let's create something great.</p>
    </footer>

   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
       
        const btn = document.getElementById('toggleMode');
        const html = document.documentElement;
        
        btn.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            btn.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('theme', isDark ? 'light' : 'dark');
        });

        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            html.setAttribute('data-theme', savedTheme);
            btn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';
        }

      
        function validateForm(event) {
            event.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const feedback = document.getElementById('formFeedback');

            if (name === "" || email === "" || message === "") {
                feedback.innerHTML = `<div class="alert alert-danger border-0 rounded-pill" style="font-size: 0.85rem">Please fill all fields.</div>`;
            } else {
                feedback.innerHTML = `<div class="alert alert-success border-0 rounded-pill" style="font-size: 0.85rem">Thank you, ${name}! Your message has been sent.</div>`;
                document.getElementById('contactForm').reset();
            }
            return false;
        }
    </script>
</body>
</html>
